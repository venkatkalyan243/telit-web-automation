name: Telit Web Automation Core Regression Suite

on:
  push:
    branches: [ main ]
  # schedule:
    # Every day at 14:30 UTC (08:00 PM IST)
    # - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Target Browser for Execution'
        required: true
        default: 'CHROME'
      env:
        description: 'Target Application Environment'
        required: true
        default: 'QA'

jobs:
  run-automation-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clone Repository Source Code
        uses: actions/checkout@v4

      - name: Provision Java 17 Runtime Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'maven'

      - name: Execute Selenium Regression Suite
        run: |
          mvn clean test \
            -Dsuite=regression \
            -Dbrowser=${{ github.event.inputs.browser || 'CHROME' }} \
            -Denv=${{ github.event.inputs.env || 'QA' }} \
            -Dheadless=true

      - name: Flatten Report Structure for Web Deployment
        if: always()
        run: |
          mkdir -p target/deploy-report
          find target/exec-outputs/ -type f -exec cp {} target/deploy-report/ \;
          ls -l target/deploy-report/

      - name: Deploy Test Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/deploy-report

      - name: Archive Consolidated Execution Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telit-execution-bundle
          path: target/exec-outputs/
          retention-days: 5
